# Default MSR-GraphRAG configuration.
# CLI scripts expose the same values as flags; this file documents reproducible defaults.

experiment:
  datasets: [hotpotqa, 2wiki, musique]
  n_samples: 300
  seed: 42
  out_dir: results

backend:
  kind: vllm
  model: Qwen/Qwen2.5-7B-Instruct
  embed_model: BAAI/bge-small-en-v1.5
  dtype: bfloat16
  max_model_len: 8192

kg:
  backend: native
  strategy: llm

scorer:
  # ConfGap = 1 - (alpha * ECS + beta * PCS + gamma * AGS)
  alpha: 0.45
  beta: 0.4
  gamma: 0.15
  tau: 0.30
  ags_signal: margin
  ags_lambda: 0.5
  draft_max_tokens: 48
  abstain_penalty: 0.35
  use_ecs: true
  use_pcs: true
  use_ags: true
  enable_routing: true

controller:
  max_steps: 7
  min_steps: 1

retriever:
  seed_top_k: 4
  seed_threshold: 0.40
  seed_ego_neighbors: 2
  breadth_add: 2
  depth_expand_per_comp: 3
  pivot_neighbors: 4
  max_subgraph_nodes: 200

ablation:
  components: [msr_full, ecs_only, pcs_only, ags_only, ecs_pcs, no_routing]
  tau_sweep: [0.10, 0.20, 0.30, 0.40, 0.50]
  weight_grid:
    - [0.45, 0.4, 0.15]
    - [0.3, 0.3, 0.4]
    - [0.5, 0.3, 0.2]
    - [0.2, 0.2, 0.6]
    - [0.4, 0.4, 0.2]
    - [0.33, 0.33, 0.34]
